<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>زواج عزام الدليلان</title>
</head>
<body>
<script>
const ICS_URL = 'https://azzam-aldulaylan.github.io/myWedding/wedding.ics';
const GOOGLE = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=زواج+عزام+الدليلان&dates=20260606T163000Z/20260606T210000Z&details=يسعدني+ويشرفني+حضوركم&location=قاعة+الضيافة+-+قاعة+أرجان،+بريدة";

const ua = navigator.userAgent;
const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
const isMac = /Macintosh/.test(ua) && navigator.maxTouchPoints > 0;

if (isIOS || isMac) {
  // Direct .ics file link — iOS Safari opens this in Apple Calendar automatically
  location.href = ICS_URL;
} else {
  location.href = GOOGLE;
}
</script>
</body>
</html>
